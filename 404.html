      text-shadow: 0 0 40px rgba(37,99,235,.45), 0 0 80px rgba(37,99,235,.2);

    .notfound-title {

    }

    .notfound-desc {

      line-height: 1.7;
      margin-bottom: 2.25rem;
      animation: fadeUp .5s ease .32s both;
    }

    .brand-inv-per     { color: var(--blue); }

    .notfound-desc a {

    }
    .notfound-desc a strong {

      text-decoration: underline;

    }

<script>
(function() {
  var el = document.getElementById('notfound-code');
  var target = 404;
  var duration = 900;
  var start = null;

  function ease(t) { return 1 - Math.pow(1 - t, 3); }

  function tick(now) {
    if (!start) start = now;
    var t = Math.min((now - start) / duration, 1);
    var val = Math.round(ease(t) * target);
    if (t >= 1) {
      el.innerHTML = '4<span class="notfound-zero">0</span>4';
    } else {
      el.textContent = String(val).padStart(3, '0');
      requestAnimationFrame(tick);
    }
  }

  requestAnimationFrame(tick);
})();
</script>
