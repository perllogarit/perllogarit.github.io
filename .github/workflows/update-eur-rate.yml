name: Update EUR/ALL Rate

on:
  schedule:
    - cron: '0 * * * *'          # every hour at :00         (24/day)
    - cron: '30 1,5,9,13,17,21 * * *'  # :30 past every 4th hour  ( 6/day)
    #                                                          = 30/day total
  workflow_dispatch:        # allow manual trigger

jobs:
  update-rate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch EUR/ALL rate
        env:
          API_KEY: ${{ secrets.EXCHANGERATE_API_KEY }}
        run: |
          RATE=$(curl -sf "https://v6.exchangerate-api.com/v6/${API_KEY}/latest/EUR" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(round(d['conversion_rates']['ALL'], 2))")
          echo "{\"rate\":$RATE,\"updated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/eur-rate.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/eur-rate.json
          git diff --cached --quiet || git commit -m "chore: update EUR/ALL rate"
          git push
