name: Update EUR/ALL Rate

on:
  schedule:
    - cron: '0 * * * *'          # every hour at :00         (24/day)
    - cron: '30 1,5,9,13,17,21 * * *'  # :30 past every 4th hour  ( 6/day)
    #                                                          = 30/day total
  workflow_dispatch:        # allow manual trigger

jobs:
  update-rate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch rates from Wise
        run: |
          EUR=$(curl -sf "https://wise.com/rates/history+live?source=EUR&target=ALL&length=1&resolution=hourly&unit=day" | python3 -c "import sys,json; d=json.load(sys.stdin); print(round(d[-1]['value'],2))")
          USD=$(curl -sf "https://wise.com/rates/history+live?source=USD&target=ALL&length=1&resolution=hourly&unit=day" | python3 -c "import sys,json; d=json.load(sys.stdin); print(round(d[-1]['value'],2))")
          GBP=$(curl -sf "https://wise.com/rates/history+live?source=GBP&target=ALL&length=1&resolution=hourly&unit=day" | python3 -c "import sys,json; d=json.load(sys.stdin); print(round(d[-1]['value'],2))")
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "{\"eur\":$EUR,\"usd\":$USD,\"gbp\":$GBP,\"updated\":\"$TS\"}" > data/eur-rate.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/eur-rate.json
          git diff --cached --quiet || git commit -m "chore: update exchange rates"
          git push
